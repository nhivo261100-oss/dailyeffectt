<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Navbar Gilroy</title>

<style>

@font-face {
  font-family: 'SVN-Gilroy';
  src: url('./fonts/SVN-Gilroy-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}

@font-face {
  font-family: 'SVN-Gilroy';
  src: url('./fonts/SVN-Gilroy-Medium.otf') format('opentype');
  font-weight: 500;
}

@font-face {
  font-family: 'SVN-Gilroy';
  src: url('./fonts/SVN-Gilroy-SemiBold.otf') format('opentype');
  font-weight: 600;
}

@font-face {
  font-family: 'SVN-Gilroy';
  src: url('./fonts/SVN-Gilroy-Bold.otf') format('opentype');
  font-weight: 700;
}

/* italic */
@font-face {
  font-family: 'SVN-Gilroy';
  src: url('./fonts/SVN-Gilroy-BlackItalic.otf') format('opentype');
  font-weight: 900;
  font-style: italic;
}
/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  z-index:1000;

  background:linear-gradient(90deg,#091524,#0b1020);
  border-bottom:1px solid rgba(0,255,180,0.15);
  overflow:hidden;
}

/* GRID BACKGROUND */
.navbar::before{
  content:"";
  position:absolute;
  inset:0;

  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

  background-size:40px 40px;
}

/* ===== KHUNG GIỮA 1/3 ===== */
.nav-inner{
  position:relative;
  z-index:2;

  width:33%;
  min-width:1050px;

  height:100%;
  margin:auto;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* ===== LOGO ===== */
.logo{
  color:#fff;
  font-size:20px;
  font-weight:700;
}

/* ===== MENU ===== */
.menu{
  display:flex;
  gap:28px;
}

.menu a{
  color:#8ea3b7;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  transition:.25s;
}

.menu a:hover{
  color:#fff;
}

/* ===== RIGHT ===== */
.right{
  display:flex;
  align-items:center;
  gap:18px;
}

.ai{
  color:#00f5a0;
  font-size:13px;
  font-weight:600;
}

.btn{
  background:linear-gradient(135deg,#00ffb3,#00c97b);
  color:#001a11;

  padding:8px 18px;
  border-radius:999px;

  font-size:13px;
  font-weight:700;
}

/* ===== SECTION TEST ===== */
section{
  height:100vh;
  padding-top:100px;
  color:white;
  text-align:center;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="nav-inner">

    <div class="logo">DailyEffect</div>

    <div class="menu">
      <a href="#boicanh">Bối cảnh</a>
      <a href="#thitruong">Thị trường</a>
      <a href="#hientrang">Hiện trạng</a>
      <a href="#giaiphap">Giải pháp</a>
      <a href="#review">Review & Duyệt</a>
      <a href="#lotrinh">Lộ trình</a>
    </div>

    <div class="right">
      <div class="ai">✦ AI Studio</div>
      <div class="btn">Guideline</div>
    </div>

  </div>
</div>

<section id="boicanh">Bối cảnh</section>
<section id="thitruong">Thị trường</section>
<section id="hientrang">Hiện trạng</section>
<section id="giaiphap">Giải pháp</section>
<section id="review">Review</section>
<section id="lotrinh">Lộ trình</section>

</body>
</html>
