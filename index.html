<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DailyEffect Navbar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#06101f;
      font-family:'Inter',sans-serif;
      min-height:100vh;
    }

    /* NAVBAR */
    .navbar{
      width:100%;
      height:58px;
      background:linear-gradient(
        90deg,
        #071426 0%,
        #08182c 40%,
        #07162a 100%
      );
      border-top:1px solid rgba(255,255,255,0.08);
      border-bottom:1px solid rgba(255,255,255,0.08);

      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .navbar::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          180deg,
          rgba(0,255,180,0.04),
          transparent
        );
      pointer-events:none;
    }

    .nav-container{
      width:100%;
      max-width:1400px;
      padding:0 28px;

      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    /* LEFT */
    .nav-left{
      display:flex;
      align-items:center;
      gap:54px;
    }

    .logo{
      color:white;
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.4px;
      cursor:pointer;
    }

    .logo span{
      font-weight:400;
      opacity:0.95;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:28px;
      list-style:none;
    }

    .menu a{
      text-decoration:none;
      color:rgba(255,255,255,0.68);
      font-size:13px;
      font-weight:500;
      transition:0.25s ease;
    }

    .menu a:hover{
      color:white;
    }

    .ai-link{
      color:#1ef2a6 !important;
      font-weight:600 !important;
    }

    /* RIGHT */
    .nav-right{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .guideline-btn{
      background:#15d48a;
      color:#02140e;
      border:none;
      padding:10px 18px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:0.25s ease;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 6px 20px rgba(21,212,138,0.25);
    }

    .guideline-btn:hover{
      transform:translateY(-1px);
      background:#1af09c;
    }

    .icon{
      width:14px;
      height:14px;
      border:2px solid currentColor;
      border-radius:4px;
      position:relative;
    }

    .icon::after{
      content:"";
      width:4px;
      height:4px;
      background:currentColor;
      border-radius:50%;
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    /* responsive */
    @media(max-width:1024px){
      .menu{
        display:none;
      }

      .nav-left{
        gap:20px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">

      <div class="nav-left">
        <div class="logo">
          <span>Daily</span>Effect
        </div>

        <ul class="menu">
          <li><a href="#">Bối cảnh</a></li>
          <li><a href="#">Thị trường</a></li>
          <li><a href="#">Hiện trạng</a></li>
          <li><a href="#">Giải pháp</a></li>
          <li><a href="#">Review & Duyệt</a></li>
          <li><a href="#">Lộ trình</a></li>
          <li><a href="#" class="ai-link">✦ AI Studio</a></li>
        </ul>
      </div>

      <div class="nav-right">
        <button class="guideline-btn">
          <span class="icon"></span>
          Guideline
        </button>
      </div>

    </div>
  </nav>

</body>
</html>
