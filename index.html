<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navbar</title>
  <link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&display=swap"
  rel="stylesheet"
/>
  <style>

    /* ================= FONT ================= */

    @font-face{
      font-family:"Gilroy";
      src:url("./fonts/SVN-GilroyRegular.otf") format("opentype");
      font-weight:400;
    }

    @font-face{
      font-family:"Gilroy";
      src:url("./fonts/SVN-GilroyMedium.otf") format("opentype");
      font-weight:500;
    }

    @font-face{
      font-family:"Gilroy";
      src:url("./fonts/SVN-GilroySemiBold.otf") format("opentype");
      font-weight:600;
    }

    @font-face{
      font-family:"Gilroy";
      src:url("./fonts/SVN-GilroyBold.otf") format("opentype");
      font-weight:700;
    }
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  /* thêm dòng này */
  font-family:"Gilroy", sans-serif;
}
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navbar DailyEffect</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#071223;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding-top:20px;
    }
.navbar{
  width:90%;
  max-width:1200px;

  height:64px;

  background:rgba(7,18,35,0.95);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:6px;

  display:flex;
  align-items:center;
  justify-content:center;

  position:relative;

  padding:0 60px;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 0 24px rgba(0,0,0,0.35);
}

.logo{
  position:absolute;
  left:60px;

  display:flex;
  align-items:center;

  font-size:20px;
  line-height:1;
}

.logo .daily{
  font-family:"Poppins", sans-serif;
  font-weight:300;
  color:white;
}

.logo .effect{
  font-family:"Poppins", sans-serif;
  font-weight:700;
  color:white;
}
    /* menu */
    .menu{
      display:flex;
      gap:28px;
      align-items:center;
    }

    .menu a{
      color:#9fa8b7;
      text-decoration:none;
      font-size:14px;
      transition:0.25s;
      white-space:nowrap;
    }

    .menu a:hover{
      color:white;
    }

    .menu .active{
      color:#00e5a8;
      font-weight:600;
    }

    /* button */
    .guide-btn{
      background:#00d48f;
      color:#03141f;

      padding:10px 18px;

      border-radius:999px;
      font-size:14px;
      font-weight:700;

      border:none;
      cursor:pointer;

      transition:0.25s;
      white-space:nowrap;
    }

    .guide-btn:hover{
      transform:translateY(-1px);
      opacity:0.9;
    }

    /* responsive */
    @media(max-width:1200px){
      .navbar{
        width:95%;
        min-width:auto;
      }

      .menu{
        gap:18px;
      }

      .menu a{
        font-size:13px;
      }
    }

    @media(max-width:900px){
      .menu{
        display:none;
      }
    }

  </style>
</head>

<body>

  <nav class="navbar">

<div class="logo">
  <span class="daily">Daily</span><span class="effect">Effect</span>
</div>

    <div class="menu">
      <a href="#">Bối cảnh</a>
      <a href="#">Thị trường</a>
      <a href="#">Hiện trạng</a>
      <a href="#">Giải pháp</a>
      <a href="#">Review & Duyệt</a>
      <a href="#">Lộ trình</a>
      <a href="#" class="active">AI Studio</a>
    </div>

    <button class="guide-btn">
      Guideline
    </button>

  </nav>

</body>
</html>
