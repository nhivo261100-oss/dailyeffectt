<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Navbar Center 1/3</title>

<!-- FONT GILROY -->
<style>
@font-face {
  font-family: 'SVN-Gilroy';
  src: url('SVN-Gilroy-Regular.otf');
}

body {
  margin: 0;
  font-family: 'SVN-Gilroy', sans-serif;
  background: #0a0f1c;
}

/* NAVBAR FULL */
.navbar {
  width: 100%;
  height: 70px;
  background: linear-gradient(90deg, #0b1c2c, #0a0f1c);
}

/* KHUNG GIỮA */
.nav-inner {
  width: 33%;
  margin: 0 auto; /* 👉 CÁI NÀY LÀ CHÌA KHÓA */
  
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
}
/* LOGO */
.logo {
  color: white;
  font-size: 18px;
  font-weight: 600;
}

/* MENU */
.menu {
  display: flex;
  gap: 24px;
}

.menu a {
  color: #9fb3c8;
  text-decoration: none;
  font-size: 13px;
  transition: 0.3s;
}

.menu a:hover {
  color: #ffffff;
}

/* RIGHT */
.right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.ai {
  color: #00ffa3;
  font-size: 13px;
}

.btn {
  background: linear-gradient(135deg, #00ffa3, #00c853);
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 13px;
  color: #002b1a;
  font-weight: 600;
}

/* SECTION TEST */
section {
  height: 100vh;
  padding-top: 100px;
  color: white;
  text-align: center;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="nav-inner">

    <div class="logo">DailyEffect</div>

    <div class="menu">
      <a href="#boicanh">Bối cảnh</a>
      <a href="#thitruong">Thị trường</a>
      <a href="#hientrang">Hiện trạng</a>
      <a href="#giaiphap">Giải pháp</a>
      <a href="#review">Review & Duyệt</a>
      <a href="#lotrinh">Lộ trình</a>
    </div>

    <div class="right">
      <div class="ai">✦ AI Studio</div>
      <div class="btn">Guideline</div>
    </div>

  </div>
</div>

<section id="boicanh">Bối cảnh</section>
<section id="thitruong">Thị trường</section>
<section id="hientrang">Hiện trạng</section>
<section id="giaiphap">Giải pháp</section>
<section id="review">Review</section>
<section id="lotrinh">Lộ trình</section>

</body>
</html>
