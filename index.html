<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Navbar DailyEffect</title>

  <!-- GOOGLE FONT -->
<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700&family=Montserrat:wght@300;400;500;700&display=swap"
rel="stylesheet"
/>

  <style>

    /* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  font-family:"Montserrat", sans-serif;
}

    body{
      background:#071223;

      display:flex;
      justify-content:center;
      align-items:flex-start;

      min-height:100vh;
      padding-top:20px;

      overflow-x:hidden;
    }

    /* ================= NAVBAR ================= */

    .navbar{
      width:80%;
      max-width:1500px;

      height:64px;

      background:rgba(7,18,35,0.95);

      border:1px solid rgba(255,255,255,0.08);
      border-radius:6px;

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 40px;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 0 24px rgba(0,0,0,0.35);
    }

    /* ================= LOGO ================= */

    .logo{
      display:flex;
      align-items:center;

      font-size:20px;
      line-height:1;

      white-space:nowrap;
    }

    .logo .daily{
      font-family:"Poppins", sans-serif;
      font-weight:300;
      color:white;
    }

    .logo .effect{
      font-family:"Poppins", sans-serif;
      font-weight:700;
      color:white;
    }

    /* ================= MENU ================= */

    .menu{
      display:flex;
      align-items:center;
      justify-content:center;

      gap:28px;

      flex:1;
      flex:unset;
width:100%;
    }

    .menu a{
      color:#9fa8b7;

      text-decoration:none;

      font-size:13px;
      font-weight:500;

      transition:0.25s;

      white-space:nowrap;
    }

    .menu a:hover{
      color:white;
    }

    .menu .active{
      color:#00e5a8;
      font-weight:600;
    }

    /* ================= BUTTON ================= */

    .guide-btn{
      background:#00d48f;
      color:#03141f;

      padding:10px 18px;

      border-radius:999px;

      font-size:14px;
      font-weight:700;

      border:none;

      cursor:pointer;

      transition:0.25s;

      white-space:nowrap;
    }

    .guide-btn:hover{
      transform:translateY(-1px);
      opacity:0.9;
    }

    /* ================= RESPONSIVE ================= */
@media(max-width:900px){

  .navbar{
    width:95%;

    height:auto;

    padding:16px 20px;

    flex-direction:column;

    gap:16px;
  }

  .menu{
    width:100%;

    display:grid;

    grid-template-columns:repeat(12, 1fr);

    row-gap:10px;

    align-items:center;
  }

  .menu a{
    font-size:11px;

    white-space:nowrap;

    text-align:center;
  }

  /* dòng 1 */
  .menu a:nth-child(1){
    grid-column:1 / 4;
  }

  .menu a:nth-child(2){
    grid-column:4 / 7;
  }

  .menu a:nth-child(3){
    grid-column:7 / 10;
  }

  .menu a:nth-child(4){
    grid-column:10 / 13;
  }

  /* dòng 2 */
  .menu a:nth-child(5){
    grid-column:1 / 4;
  }

  .menu a:nth-child(6){
    grid-column:4 / 7;
  }

  .menu a:nth-child(7){
    grid-column:7 / 10;
  }

  /* guideline cùng dòng 2 */
  .guide-btn{
    grid-column:10 / 13;

    padding:7px 12px;
    font-size:11px;

    justify-self:center;
  }

}
  </style>
</head>

<body>

  <nav class="navbar">

    <div class="logo">
      <span class="daily">Daily</span>
      <span class="effect">Effect</span>
    </div>

    <div class="menu">
      <a href="#">Bối cảnh</a>
      <a href="#">Thị trường</a>
      <a href="#">Hiện trạng</a>
      <a href="#">Giải pháp</a>
      <a href="#">Quy trình duyệt</a>
      <a href="#">Check-list</a>
      <a href="#" class="active">⭐ AI Studio</a>
    </div>

    <button class="guide-btn">
      Guideline
    </button>

  </nav>

</body>
</html>
